<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fruit Ninja Pro</title>
<style>
body,html{margin:0;padding:0;overflow:hidden;background:#000;font-family:Arial}
canvas{display:block}
#ui{position:fixed;top:10px;left:10px;color:#fff;font-size:18px}
</style>
</head>
<body>
<div id="ui">Skor: 0 | Can: 3</div>
<canvas id="c"></canvas><script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let fruits=[],score=0,lives=3;

// Gerçek meyve görselleri (CDN)
const images=[
 "https://i.imgur.com/6X4Qp7P.png", // karpuz
 "https://i.imgur.com/1Xq9BiB.png", // elma
 "https://i.imgur.com/Z6X6K8F.png", // muz
 "https://i.imgur.com/4dX1K9E.png"  // portakal
];

// Sesler (daha gerçekçi)
const sliceSound=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-sword-slash-2791.mp3");
const bombSound=new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-bomb-explosion-2759.mp3");

class Fruit{
 constructor(){
  this.img=new Image();
  this.img.src=images[Math.floor(Math.random()*images.length)];
  this.x=Math.random()*canvas.width;
  this.y=canvas.height+100;
  this.size=80;
  this.speedY=Math.random()*10+10;
  this.speedX=(Math.random()-0.5)*6;
  this.gravity=0.4;
 }
 update(){
  this.y-=this.speedY;
  this.x+=this.speedX;
  this.speedY-=this.gravity;
 }
 draw(){
  ctx.drawImage(this.img,this.x,this.y,this.size,this.size);
 }
}

class Bomb{
 constructor(){
  this.img=new Image();
  this.img.src="https://i.imgur.com/8Qf7Z9W.png";
  this.x=Math.random()*canvas.width;
  this.y=canvas.height+100;
  this.size=80;
  this.speedY=Math.random()*10+10;
  this.speedX=(Math.random()-0.5)*6;
  this.gravity=0.4;
 }
 update(){
  this.y-=this.speedY;
  this.x+=this.speedX;
  this.speedY-=this.gravity;
 }
 draw(){
  ctx.drawImage(this.img,this.x,this.y,this.size,this.size);
 }
}

let objects=[];

function spawn(){
 if(Math.random()<0.8){
  objects.push(new Fruit());
 }else{
  objects.push(new Bomb());
 }
}
setInterval(spawn,800);

function animate(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 objects.forEach((o,i)=>{
  o.update();
  o.draw();

  if(o.y>canvas.height+100){
   if(o instanceof Fruit){
    lives--;
    updateUI();
   }
   objects.splice(i,1);
  }
 });
 requestAnimationFrame(animate);
}
animate();

let cutting=false;
canvas.addEventListener("mousedown",()=>cutting=true);
canvas.addEventListener("mouseup",()=>cutting=false);
canvas.addEventListener("touchstart",()=>cutting=true);
canvas.addEventListener("touchend",()=>cutting=false);

canvas.addEventListener("mousemove",slice);
canvas.addEventListener("touchmove",e=>slice(e.touches[0]));

function slice(e){
 if(!cutting)return;
 const x=e.clientX,y=e.clientY;

 objects.forEach((o,i)=>{
  const dx=o.x-x;
  const dy=o.y-y;
  const dist=Math.sqrt(dx*dx+dy*dy);

  if(dist<50){
   if(o instanceof Bomb){
    bombSound.play();
    lives=0;
   }else{
    sliceSound.play();
    score++;
   }
   objects.splice(i,1);
   updateUI();
  }
 });
}

function updateUI(){
 document.getElementById("ui").innerText=`Skor: ${score} | Can: ${lives}`;
 if(lives<=0){
  alert("Game Over! Skor: "+score);
  location.reload();
 }
}

addEventListener("resize",()=>{
 canvas.width=innerWidth;
 canvas.height=innerHeight;
});
</script></body>
</html>
